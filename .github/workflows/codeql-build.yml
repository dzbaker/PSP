name: "CodeQL Analysis"

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  codeql:
    name: Codeql
    uses: nasa/cFS/.github/workflows/codeql-reusable.yml@dev
    with:
      component-path: psp
      prep: 'make native_std.prep'
      make: 'make -C build-native_std/native/default_cpu1/psp'
